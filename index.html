<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Playground PHP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>PHP Interativo</h1>
        <div class="header-actions">
          <select id="language-select">
            <option value="pt">Português</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="it">Italiano</option>
          </select>
          <button id="run-btn" class="primary-btn">
            Executar (Ctrl+S) ▶
          </button>
        </div>
      </header>

      <main class="playground-layout">
        <aside id="instructions-panel">
          <div id="exercise-content">
            <h2>Select an exercise</h2>
            <p>Loading...</p>
          </div>
          <div class="navigation-controls">
            <button id="prev-btn" class="secondary-btn">⬅ Anterior</button>
            <button id="next-btn" class="secondary-btn">Próximo ➡</button>
          </div>
        </aside>

        <div class="editor-area">
          <div id="editor-container"></div>
          <div id="output-container">
            <div class="output-header">
              <span>Resultado</span>
              <span id="test-status"></span>
            </div>
            <pre id="output"></pre>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
