name: Code Quality
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Type check
        run: npm run type-check
      - name: Build
        run: npm run build
